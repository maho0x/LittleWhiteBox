<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小白酒馆</title>
    <style>
        html,
        body,
        #app {
            width: 100%;
            height: 100%;
            margin: 0;
            background: #151311;
        }

        #xb-frame-boot {
            position: fixed;
            inset: 0;
            z-index: 1;
            display: grid;
            place-items: center;
            background: #151311;
            color: #b8b2a6;
            font: 13px/1.4 "Segoe UI", "Microsoft YaHei UI", sans-serif;
            transition: opacity 180ms ease;
        }

        #app:not(:empty) ~ #xb-frame-boot {
            opacity: 0;
            pointer-events: none;
        }

        .xb-frame-boot-core {
            display: grid;
            justify-items: center;
            gap: 14px;
            width: min(260px, calc(100vw - 64px));
        }

        .xb-frame-boot-bar {
            width: 100%;
            height: 3px;
            overflow: hidden;
            border-radius: 999px;
            background: rgba(184, 178, 166, 0.16);
        }

        .xb-frame-boot-fill {
            width: 5%;
            height: 100%;
            border-radius: inherit;
            background: #b8b2a6;
            transition: width 220ms ease;
        }

        .xb-frame-boot-hint {
            color: rgba(184, 178, 166, 0.48);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <div id="xb-frame-boot" role="status" aria-live="polite">
        <div class="xb-frame-boot-core">
            <div class="xb-frame-boot-bar" aria-hidden="true">
                <div class="xb-frame-boot-fill"></div>
            </div>
            <div class="xb-frame-boot-hint">首次加载需约30s</div>
        </div>
    </div>
    <script>
        const SOURCE_APP = 'xb-tavern-app';
        const SOURCE_HOST = 'xb-tavern-host';
        const progressFill = document.querySelector('#xb-frame-boot .xb-frame-boot-fill');
        const applyStartupProgress = (payload = {}) => {
            const rawPercent = Number(payload.percent);
            const percent = Number.isFinite(rawPercent) ? Math.max(0, Math.min(100, rawPercent)) : 5;
            if (progressFill) progressFill.style.width = `${percent}%`;
            if (payload.action) console.debug('[小白酒馆] startup', `${percent}%`, payload.action);
        };
        window.addEventListener('message', (event) => {
            if (event.origin !== window.location.origin) return;
            const data = event.data || {};
            if (data.source !== SOURCE_HOST || data.type !== 'xb-tavern:startup-progress') return;
            applyStartupProgress(data.payload || {});
        });
        window.parent?.postMessage({
            source: SOURCE_APP,
            type: 'xb-tavern:boot-ready',
            payload: {},
        }, window.location.origin);
        const version = new URLSearchParams(location.search).get('v') || '';
        const suffix = version ? `?v=${encodeURIComponent(version)}` : '';
        const stylesheet = document.createElement('link');
        stylesheet.rel = 'stylesheet';
        stylesheet.href = `./dist/tavern-app.css${suffix}`;
        document.head.appendChild(stylesheet);
        const script = document.createElement('script');
        script.type = 'module';
        script.src = `./dist/tavern-app.js${suffix}`;
        script.onerror = () => {
            const hint = document.querySelector('#xb-frame-boot .xb-frame-boot-hint');
            if (progressFill) progressFill.style.width = '100%';
            if (hint) hint.textContent = '加载失败，请刷新重试';
        };
        document.body.appendChild(script);
    </script>
</body>
</html>
